<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            justify-content: center;
        }
        table{
            border: 1px solid black;
            width: 900px;
        }
        td{
            border: 1px solid black;
        }
        .top{
            height: 40px;
            background-color: #5f7540;
        }
        .left{
            height: 400px;
        }
        .center{
            width: 500px;
        }
        .center img{
            height: 330px;
        }
        .buttom{
            height: 40px;
            background-color: #24355f;
        }
    </style>
    
</head>
<body>
    <table>
        <tr>
            <td class="top" colspan="3"></td>
        </tr>
        <tr>
            <td class="left"></td>
            <td class="center">
                <img src="/table/images.jpg" alt="">
            </td>
            <td class="right"></td>
        </tr>
        <tr>
            <td class="buttom" colspan="3"></td>
        </tr>
    </table>
</body>
</html>
