<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ob-havo</title>
  <link rel="stylesheet" href="/ob-havo/ob-havo.css">
</head>
<body>

  <div class="container">
    
    <!-- Chap panel — Ob-havo -->
    <div class="chap">
      
      <!-- Qidiruv -->
     

      <!-- Ob-havo ma'lumoti -->
     <div class="obhavo">

    <div class="temp">
        <h1 id="harorat">26°C</h1>
    </div>

    <div class="joy">
        <h2 id="shaharNomi">
            Toshkent
        </h2>
        <small id="data">10:30 - Sunday, 22 Oct '19</small>
    </div>

    <div class="holat">
        <p>☀️</p>
        <small>Sunny</small>
    </div>

</div>

    </div>

   
    <div class="ong">
        
      <div class="qidiruv">
        <input type="text" id="shahar" placeholder="Qidiruv">
        <button id="qidirTugma">🔍</button>
      </div>
      <hr>
      <ul id="viloyatlar" style=" list-style: none; padding: 0; margin: 0;">
        <li>Toshkent</li>
        <li>Samarqand</li>
        <li>Buxoro</li>
        <li>Andijon</li>
        <li>Namangan</li>
        
      </ul>
      <hr>
      <div class="malimot">
        <span>Claude</span>
        <span>12%</span>
      </div>
      <div class="malimot">
        <span>Humidity</span>
        <span>78%</span>
      </div>
      <div class="malimot">
        <span>Wind</span>
        <span>1 km/h</span>
      </div>
      <div class="malimot">
        <span>Rain</span>
        <span>0 mm</span>
      </div>
      <hr>
    </div>

  </div>

  <script src="/ob-havo/ob-havo.js"></script>
</body>
</html>
